name: legacy ci
on:
    workflow_dispatch: 
    # pull_request:
jobs: 
    job1:
        runs-on: linux-vm
        steps:
            - name: copy code
              uses: actions/checkout@v4
            - name: install node version 20
              uses: actions/setup-node@v6.1.0
              with:
                node-version: 20
            - run: npm install
            - run: npm run lint
            - run: npm run test
            - run: npm run build
            - name: upload build artifacts 
              uses: actions/upload-artifact@v4
              with:
                     name: react-app-build
                     path: dist/