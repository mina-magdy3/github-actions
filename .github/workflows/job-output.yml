name: job output
on:
   workflow_dispatch:
jobs:
    generate-message:
        runs-on: ubuntu-latest
        outputs: 
            job_message: ${{steps.step-message.outputs.message}}
        steps:
           - id: step-message
             run: |    
               echo "message=(hello from job 1)" >> GITHUB_OUTPUT
               echo "${{steps.step-message.outputs.message}}"
    consume_message:
        runs-on: ubuntu-latest
        needs: generate-message
        steps:
            - run: |
               echo " ${{ needs.generate-message.outputs.job_message }} "            
            